<!doctype html>
<html>
	<head>
		<style>
			html,
			body {
				background: #171717 !important;
                color-scheme: dark;
			}
		</style>
	</head>

	<script>
		window.addEventListener("load", async () => {
			await Promise.all(
				[...document.images].map((img) =>
					img.complete
						? Promise.resolve()
						: new Promise((resolve) => {
								img.onload = resolve;
								img.onerror = resolve;
							}),
				),
			);

			if (document.fonts?.ready) {
				await document.fonts.ready;
			}

			requestAnimationFrame(() => {
				parent.postMessage(
					{
						height: document.documentElement.scrollHeight,
					},
					"*",
				);
			});
		});
	</script>

	<body>
		{{content}}
	</body>
</html>
